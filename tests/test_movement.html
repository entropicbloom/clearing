<!DOCTYPE html>
<html lang="en">
<head>
    <title>Movement Tests</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #eee; }
        .pass { color: #4caf50; }
        .fail { color: #f44336; }
        .suite { color: #90caf9; font-size: 1.1em; margin-top: 16px; }
        #results { white-space: pre-wrap; }
    </style>
</head>
<body>
<h2>Tile-Based Movement Tests</h2>
<div id="results"></div>

<script>
let testResults = { passed: 0, failed: 0 };
const results = [];

function describe(name, fn) {
    results.push({ type: 'suite', text: name });
    fn();
}

function it(name, fn) {
    try {
        fn();
        results.push({ type: 'pass', text: '  PASS: ' + name });
        testResults.passed++;
    } catch (e) {
        results.push({ type: 'fail', text: '  FAIL: ' + name + '\n    ' + e.message });
        testResults.failed++;
    }
}

function assert(condition, msg) {
    if (!condition) throw new Error(msg || 'Assertion failed');
}

function assertClose(a, b, epsilon, msg) {
    if (Math.abs(a - b) > (epsilon || 0.01))
        throw new Error((msg || '') + ' expected ' + b + ' got ' + a);
}

function fill() {}
function circle() {}
function image() {}
function push() {}
function pop() {}
function scale() {}
function min(a, b) { return Math.min(a, b); }
function max(a, b) { return Math.max(a, b); }

var CHAR_SPRITES_CONFIG = {
    'offset': 16, 'border': 0,
    'colors': ['red', 'blue', 'green', 'brown'],
    'color_offset': 8
};
</script>
<script src="../src/object.js"></script>
<script src="../src/agent.js"></script>
<script>

function make_mock_env(passable) {
    return {
        tile_can_pass: function() { return passable; },
        redraw_at_object: function() {},
        move_environment: function() {},
        get_x_offset: function() { return 0; },
        get_y_offset: function() { return 0; },
        check_passage: function() { return null; }
    };
}

function make_mock_world(passable) {
    var w = {};
    w.current_env = make_mock_env(passable !== false);
    w.player = null;
    w.char_sprite_arr = [];
    return w;
}

function make_agent(world, ti, tj) {
    ti = (ti !== undefined) ? ti : 10;
    tj = (tj !== undefined) ? tj : 13;
    return new Agent(world, ti, tj, 25, 25);
}

describe('Agent constructor', function() {
    it('initializes with tile coords and pixel position', function() {
        var w = make_mock_world();
        var a = make_agent(w, 10, 13);
        assert(a.tile_i === 10 && a.tile_j === 13);
        assert(a.x === 315 && a.y === 405);
    });
});

describe('Agent.move()', function() {
    it('moves right: tile_i increments', function() {
        var w = make_mock_world(true);
        var a = make_agent(w, 10, 13);
        assert(a.move('right') === true);
        assert(a.tile_i === 11 && a.tile_j === 13);
        assert(a.isMoving === true);
    });

    it('rejects impassable', function() {
        var w = make_mock_world(false);
        var a = make_agent(w, 10, 13);
        assert(a.move('right') === false);
        assert(a.tile_i === 10);
    });

    it('rejects while moving', function() {
        var w = make_mock_world(true);
        var a = make_agent(w, 10, 13);
        a.move('right');
        assert(a.move('up') === false);
    });
});

describe('Interpolation', function() {
    it('snaps to target after moveDuration frames', function() {
        var w = make_mock_world(true);
        var a = make_agent(w, 10, 13);
        a.move('right');
        for (var i = 0; i < 8; i++) a.update_movement();
        assert(a.x === 345 && a.y === 405);
        assert(a.isMoving === false);
    });
});

describe('sync_position()', function() {
    it('recomputes pixel from tile coords', function() {
        var w = make_mock_world();
        var a = make_agent(w, 10, 13);
        a.tile_i = 5; a.tile_j = 7;
        a.sync_position();
        assert(a.x === 165 && a.y === 225);
    });
});

var el = document.getElementById('results');
results.forEach(function(r) {
    var div = document.createElement('div');
    div.className = r.type;
    div.textContent = r.text;
    el.appendChild(div);
});

var summary = document.createElement('div');
summary.style.marginTop = '20px';
summary.style.fontSize = '1.2em';
summary.textContent = testResults.passed + ' passed, ' + testResults.failed + ' failed';
summary.className = testResults.failed > 0 ? 'fail' : 'pass';
el.appendChild(summary);
</script>
</body>
</html>
